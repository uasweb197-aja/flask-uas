{% extends 'base.html' %}

{% block content %}
<div class="card form-card">
    <div class="card-header">
        <div class="header-left">
            <h2>Tambah Buku Baru</h2>
            <p class="header-desc">Tambahkan data buku baru ke dalam database.</p>
        </div>
        <a href="{{ url_for('index') }}" class="btn btn-outline">
            <i class="fa-solid fa-arrow-left"></i> Kembali
        </a>
    </div>
    
    <div class="card-body">
        <form action="{{ url_for('add_book') }}" method="POST" class="modern-form">
            <div class="form-group">
                <label for="judul"><i class="fa-solid fa-book"></i> Judul Buku</label>
                <input type="text" id="judul" name="judul" required placeholder="Masukkan judul lengkap buku..." autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="penulis"><i class="fa-solid fa-user-pen"></i> Penulis / Pengarang</label>
                <input type="text" id="penulis" name="penulis" required placeholder="Masukkan nama penulis..." autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="penerbit"><i class="fa-solid fa-building-columns"></i> Penerbit</label>
                <input type="text" id="penerbit" name="penerbit" required placeholder="Masukkan nama penerbit..." autocomplete="off">
            </div>
            
            <div class="form-actions">
                <a href="{{ url_for('index') }}" class="btn btn-outline">Batal</a>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-floppy-disk"></i> Simpan Buku
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
